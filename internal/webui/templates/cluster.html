{{define "content"}}
<header class="page">
  <h1>Cluster</h1>
  <button class="btn-secondary" onclick="refreshClusterPods()">Refresh</button>
</header>

<p class="hint">
  Pods nei namespace listati in <code>INCLUDE_NAMESPACES</code>. Click su "Logs"
  apre il tail per il pod selezionato.
</p>

<section class="card">
  <div class="grid-3">
    <label>Namespace
      <select id="cluster-ns" onchange="refreshClusterPods()"></select>
    </label>
    <label>Phase
      <select id="cluster-phase" onchange="refreshClusterPods()">
        <option value="">all</option>
        <option>Running</option>
        <option>Pending</option>
        <option>Succeeded</option>
        <option>Failed</option>
        <option>Unknown</option>
      </select>
    </label>
    <label>Name contains
      <input id="cluster-name" oninput="refreshClusterPodsDebounced()" placeholder="my-app">
    </label>
  </div>
  <p id="cluster-counts" class="hint" style="margin-top: 12px"></p>
</section>

<table class="table">
  <thead>
    <tr>
      <th>Name</th><th>Phase</th><th>Ready</th><th>Restarts</th><th>Last reason</th>
      <th>Containers</th><th>Age</th><th>Node</th><th></th>
    </tr>
  </thead>
  <tbody id="cluster-pod-rows"></tbody>
</table>

<div id="log-modal" class="modal" style="display:none">
  <div class="modal-card">
    <header>
      <strong id="log-modal-title">logs</strong>
      <div>
        <label class="checkbox">
          <input type="checkbox" id="log-modal-previous" onchange="reloadModalLogs()"> previous
        </label>
        <button class="btn-secondary" onclick="reloadModalLogs()">Reload</button>
        <button class="btn-link" onclick="closeLogModal()">close</button>
      </div>
    </header>
    <pre id="log-modal-body" class="logs"></pre>
  </div>
</div>
{{end}}
{{template "layout" .}}
