{{define "content"}}
<header class="page">
  <h1>Logs</h1>
  <div>
    <button class="btn-secondary" onclick="clearLogs()">Clear</button>
    <button id="log-toggle" class="btn-primary" onclick="toggleLogStream()">Pause</button>
  </div>
</header>

<p class="hint">Live tail of the agent pod via Server-Sent Events. The newest line appears at the bottom.</p>

<pre id="log-view" class="logs"></pre>

<script>window.addEventListener('DOMContentLoaded', startLogStream);</script>
{{end}}
{{template "layout" .}}
