## ai-remediator agent + admin GUI
##
## End-to-end manifest: ConfigMap (non-secret config), Secret (SMTP password
## and webui basic-auth credentials), Deployment, Service, optional Ingress.
##
## Customise BEFORE applying:
##   - container image (search "CUSTOMISE BEFORE APPLYING" below): defaults to
##     host.docker.internal:5050/k8s-ai-remediator:latest, matching the local
##     registry used in the README "Build" section. Replace with your own
##     registry path if you push elsewhere.
##   - WEBUI_PASSWORD in the Secret: the default "change-me-please" is just a
##     placeholder. Pick a strong password and front the GUI with TLS.
##
## The admin GUI is opt-in: set WEBUI_ENABLED=true and provide
## WEBUI_USERNAME/PASSWORD via the Secret to expose it.
##
##   kubectl apply -f rbac-namespaced.yaml
##   kubectl apply -f redis.yaml      # required: dedup backend (DEDUP_BACKEND=redis)
##   kubectl apply -f agent.yaml
##
## Redis is the default dedup backend. Apply redis.yaml before (or together
## with) agent.yaml, or just run scripts/install.sh which wires it up for you.
##
## After the rollout, point your browser at https://<ingress-host>/ and log in
## with the basic-auth credentials from the Secret.

---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-remediator
  labels:
    ai-remediator/managed: "true"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-remediator-config
  namespace: ai-remediator
data:
  OLLAMA_BASE_URL: "http://ollama.ollama.svc.cluster.local:11434/api"
  OLLAMA_MODEL: "qwen3.5:9b"
  # Reasoning ("thinking") mode, sent as the native `think` parameter of the
  # Ollama chat API. qwen3.x and gemma4 are reasoning models: with thinking
  # left on, every call spends minutes emitting reasoning tokens on CPU and
  # times out before producing any JSON. Values: "false" (default), "true",
  # "auto" (= server/model default). Models without the capability are
  # detected and handled automatically.
  OLLAMA_THINK: "false"
  DRY_RUN: "false"
  MIN_SEVERITY: "medium"
  POLL_INTERVAL_SECONDS: "30"
  SCALE_MIN: "1"
  SCALE_MAX: "5"
  ALLOW_PATCH_PROBE: "false"
  ALLOW_PATCH_RESOURCES: "false"
  ALLOW_PATCH_REGISTRY: "false"
  EXCLUDE_NAMESPACES: "kube-system,kube-public,kube-node-lease,local-path-storage,ai-remediator"
  # Redis is the default (and recommended) dedup backend: it keeps the
  # "already seen / already remediated" state across agent restarts and
  # leader failovers, so a restart cannot re-fire a remediation within the
  # dedup TTL. Deploy it with `kubectl apply -f redis.yaml` (or via
  # scripts/install.sh, which does it automatically). To point at an
  # external Redis, change REDIS_ADDR. If Redis is unreachable the agent
  # logs an error and falls back to in-memory dedup (never blocks).
  DEDUP_BACKEND: "redis"
  REDIS_ADDR: "ai-remediator-redis:6379"
  LEADER_ELECTION: "true"
  LEASE_NAME: "ai-remediator-leader"
  LEASE_NAMESPACE: "ai-remediator"

  WEBUI_ENABLED: "true"
  WEBUI_ADDR: ":8080"
  AGENT_NAMESPACE: "ai-remediator"
  AGENT_DEPLOYMENT_NAME: "ai-remediator-agent"
  AGENT_CONFIGMAP_NAME: "ai-remediator-config"
  AGENT_SECRET_NAME: "ai-remediator-secrets"
  SCENARIO_SANDBOX_NAMESPACES: "incident-lab"

  NOTIFY_SMTP_HOST: ""
  NOTIFY_SMTP_PORT: "587"
  NOTIFY_SMTP_USER: ""
  NOTIFY_FROM: ""
  NOTIFY_TO: ""
  NOTIFY_MIN_SEVERITY: "medium"

---
## Replace the placeholder values before applying. The webui credentials are
## the only authentication layer in front of mutating endpoints, so use a
## strong password and front the GUI with TLS at the Ingress.
apiVersion: v1
kind: Secret
metadata:
  name: ai-remediator-secrets
  namespace: ai-remediator
type: Opaque
stringData:
  WEBUI_USERNAME: "admin"
  WEBUI_PASSWORD: "change-me-please"
  NOTIFY_SMTP_PASSWORD: ""

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-remediator-agent
  namespace: ai-remediator
  labels:
    app: ai-remediator-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-remediator-agent
  template:
    metadata:
      labels:
        app: ai-remediator-agent
    spec:
      serviceAccountName: ai-remediator
      # Pod-level hardening: enforce non-root and the default seccomp profile so
      # the Deployment satisfies the Pod Security "restricted" standard. The
      # distroless:nonroot image already runs as uid 65532; this makes it a
      # contract the API server enforces rather than an image detail.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          # Container-level hardening: drop all capabilities, forbid privilege
          # escalation and run on a read-only root filesystem. The agent writes
          # nothing to local disk (state lives in Redis/the API server), so a
          # read-only rootfs has no functional impact.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          # !!! CUSTOMISE BEFORE APPLYING !!!
          # Default points to the local registry used throughout the README
          # ("Build and push to the local registry"). If you build/push to a
          # different registry (private GHCR, ECR, your-org/...), update the
          # value here OR override after apply with:
          #   kubectl -n ai-remediator set image deployment/ai-remediator-agent \
          #     agent=<your-registry>/k8s-ai-remediator:<tag>
          image: host.docker.internal:5050/k8s-ai-remediator:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ai-remediator-config
            - secretRef:
                name: ai-remediator-secrets
          env:
            # Redis password for the dedup backend. Sourced from the
            # ai-remediator-redis Secret created alongside redis.yaml. Marked
            # optional so an empty/absent Secret means an unauthenticated
            # Redis the agent connects to without a password.
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-remediator-redis
                  key: password
                  optional: true
          ports:
            - name: metrics
              containerPort: 9090
            - name: webui
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          # /healthz returns 503 when the leader's poll loop stops completing
          # cycles (heartbeat older than the poll context timeout plus a few
          # intervals), so a wedged agent gets restarted instead of silently
          # doing nothing. Followers always report healthy.
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: ai-remediator-webui
  namespace: ai-remediator
spec:
  selector:
    app: ai-remediator-agent
  ports:
    - name: http
      port: 80
      targetPort: webui

---
## Optional: expose the GUI via Ingress. TLS termination at the Ingress is
## strongly recommended — basic-auth credentials are sent in clear text and
