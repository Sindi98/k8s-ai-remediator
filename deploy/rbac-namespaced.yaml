## Namespace-scoped RBAC for ai-remediator (ADVANCED — read the caveat).
##
## Use this to scope the agent's WRITE access (remediation) to specific
## namespaces. Create one Role + RoleBinding per namespace.
##
## CAVEAT: this file alone is NOT sufficient. The agent lists Warning events
## across ALL namespaces in a single call (Events("").List), which needs a
## CLUSTER-scoped read on events/pods/namespaces. So even for a namespace-
## restricted setup you must also apply deploy/rbac-cluster.yaml (for the
## cluster-wide reads) and set INCLUDE_NAMESPACES to limit where the agent
## acts. For the common "watch the whole cluster" case just use
## deploy/rbac-cluster.yaml on its own.
##
## Usage:
##   kubectl apply -f rbac-cluster.yaml        # cluster-wide reads (required)
##   kubectl apply -f rbac-namespaced.yaml     # plus namespaced writes
##   # Repeat the namespaced Role/RoleBinding for each additional namespace.

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-remediator
  namespace: ai-remediator

---
## Role scoped to the target namespace (e.g. "incident-lab")
## Replicate this for each namespace the agent should monitor.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-remediator
  namespace: incident-lab
rules:
  - apiGroups: [""]
    resources: [pods, pods/log, events]
    verbs: [get, list, watch, delete]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list]
  - apiGroups: [apps]
    resources: [deployments, replicasets]
    verbs: [get, list, watch, update, patch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-remediator
  namespace: incident-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ai-remediator
subjects:
  - kind: ServiceAccount
    name: ai-remediator
    namespace: ai-remediator

---
## Role in the agent's own namespace for leader election leases
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-remediator-leader-election
  namespace: ai-remediator
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, create, update]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-remediator-leader-election
  namespace: ai-remediator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ai-remediator-leader-election
subjects:
  - kind: ServiceAccount
    name: ai-remediator
    namespace: ai-remediator
