# Scenario: FailedScheduling con risorse impossibili (severita GRAVE)
#
# Il pod richiede quantita di CPU e memoria che nessun nodo del cluster
# puo soddisfare. Lo scheduler fallisce ripetutamente generando eventi
# Warning di reason FailedScheduling.
#
# Impatto: il workload non partira MAI senza intervento umano (ridurre i
# requests, aggiungere nodi, cambiare profilo hw). E grave perche e un
# blocco permanente e nessuna azione automatica dell'agente puo risolverlo.
# Remediation tipica dell'agente: mark_for_manual_fix o ask_human.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unschedulable
  namespace: incident-lab
  labels:
    app: unschedulable
    scenario: severe
    error-type: failed-scheduling
spec:
  replicas: 1
  selector:
    matchLabels:
      app: unschedulable
  template:
    metadata:
      labels:
        app: unschedulable
        scenario: severe
    spec:
      containers:
        - name: app
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: "500"
              memory: "500Gi"
            limits:
              cpu: "500"
              memory: "500Gi"
